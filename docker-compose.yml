#Place this file outside of script directory under RestorantWorkspace root directory. This is the main docker-compose file that defines all services and their configurations.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── Infrastructure ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mithila-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: mithiladhaba_dev
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mithila-redis
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mithila-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mithila-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    logging: *default-logging

  # ── Application services (profile: full) ─────────────────────
  backbone:
    build:
      context: ./mithila-backbone-svc
    container_name: mithila-backbone-svc
    profiles: ["full"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mithiladhaba_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dev}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dev123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-64-characters-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
      APP_INTERNAL_SECRET: ${APP_INTERNAL_SECRET:-dev-internal-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      MAIL_USERNAME: ${MAIL_USERNAME:-dev@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-placeholder}
    ports:
      - "8080:8080"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-svc:
    build:
      context: ./mithila-notification-svc
    container_name: mithila-notification-svc
    profiles: ["full"]
    depends_on:
      backbone:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mithiladhaba_notifications_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dev}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dev123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BACKBONE_SVC_URL: http://backbone:8080
      INTERNAL_SECRET: ${APP_INTERNAL_SECRET:-dev-internal-secret}
      MAIL_USERNAME: ${MAIL_USERNAME:-dev@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-placeholder}
    ports:
      - "8081:8081"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gateway:
    build:
      context: ./mithila-gateway
    container_name: mithila-gateway
    profiles: ["full"]
    depends_on:
      backbone:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      BACKBONE_SVC_URL: http://backbone:8080
      NOTIFICATION_SVC_URL: http://notification-svc:8081
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-64-characters-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
      ALLOWED_ORIGIN_1: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8090:8090"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
